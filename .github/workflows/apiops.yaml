name: Update file in another repo and create PR

on:
  workflow_call:
    inputs:
      api_name:
        description: "Name of the API to update"
        required: false
        type: string
    secrets:
        TARGET_REPO_TOKEN:
            required: true


env:
    API_NAME: ${{ inputs.api_name }}
jobs:
  update-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source-repo
          fetch-depth: 0

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Hemachandra1233/mvn-test
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: target-repo
          fetch-depth: 0

    #   - name: Update file
    #     run: |
    #       ls
    #       pwd
    #       cd target-repo
    #       echo "Updated at $(date)" >> example.txt
    #       cat example.txt

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Check current directory and list files
        run: |
          pwd
          ls -la

      - name: Create branch, update spec, commit, push and create a PR
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          cd target-repo
          ls
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          for env in dev test uat prod; do
            git checkout $env
            git pull origin $env
            BRANCH_NAME="auto-update-$env-$(date +%s)"
            git checkout -b $BRANCH_NAME
            cd ..
            pwd
            ls -la
            # cp ../source-repo/api/specification.json ./published-artifacts/apis/dev-api/specification.json

            echo "commiting code to target repo"

            git add .
            git commit -m "Automated update" || echo "No changes to commit"
            git push origin $BRANCH_NAME

            gh pr create \
                --title "Automated update" \
                --body "This PR was created automatically by GitHub Actions." \
                --base $env \
                --head $BRANCH_NAME

            echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          done